name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # ── Статический анализ всех скриптов ────────────────────────────────────────
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Gate (severity=error — блокирует merge)
        run: shellcheck -x --severity=error install.sh scripts/*.sh scripts/lib/*.sh
      - name: Report (severity=style — информационно, не блокирует)
        continue-on-error: true
        run: shellcheck -x --severity=style install.sh scripts/*.sh scripts/lib/*.sh
      - name: apply-path smoke (set -u — полный apply protect.sh через стабы)
        # Ловит unbound-vars в ветках, исполняемых только при реальном применении
        # (модули fleet/blocklists/ctguard, маркер, save_conf) — их не видит DRY_RUN/bash -n.
        run: bash tests/apply-smoke.sh

  # ── Smoke-тесты на матрице дистрибутивов ────────────────────────────────────
  # Ловит ровно тот класс регрессий, из-за которых появился этот PR: установка
  # XanMod на разных Ubuntu/Debian и генерация nftables-ruleset.
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - "debian:bookworm"
          - "debian:trixie"
          - "ubuntu:22.04"   # jammy → подменяется на bookworm
          - "ubuntu:24.04"   # noble
          - "ubuntu:26.04"   # свежий LTS: XanMod/CrowdSec-suite резолвятся через фоллбэки
    container:
      image: ${{ matrix.image }}
      # protect.sh DRY_RUN вызывает 'nft -c', который валидирует ruleset через netlink
      # к netfilter ядра — без CAP_NET_ADMIN это «Operation not permitted». --privileged
      # даёт те же права, что есть у скрипта на реальной ноде под root.
      options: --privileged
    steps:
      - name: Install git (нужен checkout) + базовые сертификаты
        run: apt-get update -qq && apt-get install -y -qq --no-install-recommends git ca-certificates
      - uses: actions/checkout@v4
      - name: Prep container + runtime-зависимости
        run: |
          # Запрещаем запуск сервисов из postinst (в контейнере нет systemd как PID1)
          printf '#!/bin/sh\nexit 101\n' > /usr/sbin/policy-rc.d && chmod +x /usr/sbin/policy-rc.d
          apt-get install -y -qq --no-install-recommends \
            bash curl gnupg nftables iproute2 gawk procps kmod coreutils irqbalance ethtool jq
      - name: Syntax (bash -n)
        run: bash -n install.sh scripts/*.sh scripts/lib/*.sh
      - name: protect.sh DRY_RUN (дефолты — генерация + nft -c)
        run: DRY_RUN=1 REMNAWAVE_NONINTERACTIVE=1 bash scripts/protect.sh
      - name: protect.sh DRY_RUN (full-feature — blocklists/fleet/whitelist-only/ban-once → nft -c)
        run: |
          DRY_RUN=1 REMNAWAVE_NONINTERACTIVE=1 \
            ENABLE_BLOCKLISTS=1 BLOCK_TOR=1 ENABLE_BANONCE=1 \
            FLEET_SYNC=1 REMNAWAVE_URL=https://panel.example.com REMNAWAVE_TOKEN=ci-token \
            WHITELIST="1.2.3.4,2001:db8::1" NODE_PORT_WHITELIST_ONLY=1 \
            bash scripts/protect.sh
      - name: protect.sh — отказ на кривом ENV (валидация)
        run: |
          if SYN_RATE='x; rm' DRY_RUN=1 REMNAWAVE_NONINTERACTIVE=1 bash scripts/protect.sh 2>/dev/null; then
            echo "валидация НЕ сработала на кривом SYN_RATE"; exit 1
          else echo "ok: кривой ENV отвергнут"; fi
      - name: protect.sh DRY_RUN (FW_MODE=open — 3x-ui-режим, policy accept → nft -c)
        run: DRY_RUN=1 REMNAWAVE_NONINTERACTIVE=1 FW_MODE=open bash scripts/protect.sh
      - name: protect.sh DRY_RUN (FW_MODE=skip — файрвол пропущен, инструкция напечатана)
        run: |
          OUT="$(DRY_RUN=1 REMNAWAVE_NONINTERACTIVE=1 FW_MODE=skip bash scripts/protect.sh)"
          echo "$OUT" | grep -q 'Как закрыть порты самому' || { echo "skip: инструкция по ручной блокировке не напечатана"; exit 1; }
      - name: protect.sh — отказ на кривом FW_MODE
        run: |
          if FW_MODE=firewall DRY_RUN=1 REMNAWAVE_NONINTERACTIVE=1 bash scripts/protect.sh 2>/dev/null; then
            echo "валидация НЕ сработала на кривом FW_MODE"; exit 1
          else echo "ok: кривой FW_MODE отвергнут"; fi
      - name: diagnose.sh (read-only, не должен падать жёстко)
        run: bash scripts/diagnose.sh || true
      - name: diagnose.sh --json (machine-readable smoke)
        run: bash scripts/diagnose.sh --json || true
      - name: diagnose.sh --retrans (deep-dive smoke, короткое окно)
        run: bash scripts/diagnose.sh --retrans --window 5 || true
      - name: na-report smoke (--json / --ip / --port)
        run: |
          bash scripts/na-report.sh --json | grep -q '"drops_by_reason"' || { echo "na-report --json без drops_by_reason"; exit 1; }
          L="$(bash scripts/na-report.sh --json | wc -l)"; [ "$L" -eq 1 ] || { echo "na-report --json должен быть ОДНОЙ строкой (битый JSON), получено: $L"; exit 1; }
          bash scripts/na-report.sh --ip 127.0.0.1 >/dev/null 2>&1 || true
          bash scripts/na-report.sh --port 443 >/dev/null 2>&1 || true
          echo "ok: na-report --json/--ip/--port отработали"
      - name: JSON-валидность (jq) + na_version + --proxyware одна строка
        run: |
          bash scripts/diagnose.sh --json | jq -e . >/dev/null || { echo "diagnose --json не парсится jq"; exit 1; }
          bash scripts/diagnose.sh --json | grep -q '"na_version":"' || { echo "diagnose --json без na_version"; exit 1; }
          bash scripts/na-report.sh --json | jq -e . >/dev/null || { echo "na-report --json не парсится jq"; exit 1; }
          P="$(bash scripts/na-report.sh --proxyware --json)"
          [ "$(printf '%s\n' "$P" | wc -l)" -eq 1 ] || { echo "--proxyware --json должен быть ОДНОЙ строкой"; exit 1; }
          printf '%s' "$P" | jq -e . >/dev/null || { echo "--proxyware --json не парсится jq"; exit 1; }
          echo "ok: все --json валидны, na_version присутствует"
      - name: protect.sh DRY_RUN (fleet-sync через REMNAWAVE_NODES_URL, без токена)
        run: |
          DRY_RUN=1 REMNAWAVE_NONINTERACTIVE=1 FLEET_SYNC=1 \
            REMNAWAVE_NODES_URL=https://panel.example.com/fleet/nodes.json \
            bash scripts/protect.sh
      - name: CrowdSec-репозиторий резолвится (CROWDSEC_PROBE, без установки)
        run: CROWDSEC_PROBE=1 REMNAWAVE_NONINTERACTIVE=1 bash scripts/protect.sh
      - name: install.sh persist → CLI na-diagnose + na-report создаются и отдают JSON
        run: |
          bash install.sh persist
          test -x /usr/local/sbin/na-diagnose || { echo "na-diagnose не создан"; exit 1; }
          test -x /usr/local/sbin/na-report   || { echo "na-report не создан"; exit 1; }
          /usr/local/sbin/na-diagnose --json | grep -q '"firewall"' || { echo "na-diagnose --json не отдал JSON"; exit 1; }
          /usr/local/sbin/na-report --json | grep -q '"drops_by_reason"' || { echo "na-report --json не отдал JSON"; exit 1; }
          echo "ok: na-diagnose + na-report установлены и отдают JSON"
      - name: DRY_RUN persist — без побочных эффектов
        run: |
          rm -f /usr/local/sbin/na-diagnose
          DRY_RUN=1 bash install.sh persist
          test ! -e /usr/local/sbin/na-diagnose || { echo "DRY_RUN всё равно создал CLI"; exit 1; }
          echo "ok: DRY_RUN ничего не пишет"
      - name: rollback снимает CLI, когда модулей не осталось
        run: |
          bash install.sh persist
          bash install.sh rollback all
          test ! -e /usr/local/sbin/na-diagnose || { echo "na-diagnose не снят rollback'ом"; exit 1; }
          test ! -e /usr/local/sbin/na-report   || { echo "na-report не снят rollback'ом"; exit 1; }
          echo "ok: rollback убрал CLI"
      - name: XanMod репозиторий+ключ+кандидат резолвятся (без установки ядра)
        run: XANMOD_PROBE=1 ENABLE_XANMOD=1 bash scripts/optimize.sh
